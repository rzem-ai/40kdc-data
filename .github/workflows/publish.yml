name: Publish 40kdc core to R2

# Publishes ONLY this repo's slice as a single merged bundle (bundle-core.json) to the
# private 40kdc-reference bucket. The 40kdc-abilities repo publishes bundle-abilities.json
# independently. The app fetches both via presigned URLs minted by the Fly signer.
# No cross-repo coupling, no public access, no PAT.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: publish-r2-core
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build bundle-core.json
        run: node scripts/build-publish.mjs
        env:
          VERSION: ${{ github.sha }}

      - name: Upload bundle to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 cp dist/bundle-core.json "s3://${{ secrets.R2_BUCKET }}/bundle-core.json" \
            --endpoint-url "https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com" \
            --content-type application/json
