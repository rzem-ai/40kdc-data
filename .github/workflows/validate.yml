name: Validate Data

on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd tools && npm ci
      # Regenerate the TS types from the committed bundle and fail if they
      # drifted (the bundle's own freshness vs the schemas is checked in `rust`).
      - run: cd tools && npm run codegen:types
      - name: Check generated TS types are up to date
        run: git diff --exit-code tools/src/generated.ts
      - run: cd tools && npm run build
      - run: cd tools && npm test
      - run: cd tools && npm run validate

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Regenerate the bundled schema and Rust types, then fail if the committed
      # artifacts drifted from the schemas (forces codegen to be re-run in the PR).
      - run: cd tools && npm ci
      - run: cd tools && npm run bundle:schemas
      - run: cargo run -p xtask -- codegen
      - run: cargo run -p xtask -- bundle-data
      - name: Check generated artifacts are up to date
        run: git diff --exit-code crates/wh40kdc/schemas/bundled.schema.json crates/wh40kdc/src/generated.rs crates/wh40kdc/src/data/bundle.generated.json
      - run: cargo fmt --all -- --check
      - run: cargo build --workspace
      - run: cargo test --workspace

  conformance:
    # The tie-out gate: the Rust crate and the TS package must produce identical
    # results over one shared corpus (conformance/). Regenerate the goldens from
    # the TS reference, fail if they drifted, then run both implementations'
    # conformance suites against the committed corpus.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cd tools && npm ci
      - run: cd tools && npm run build
      - run: cd tools && npm run gen:conformance
      - name: Check conformance corpus is up to date
        run: git diff --exit-code conformance/
      - name: TS conformance suite
        run: cd tools && npx vitest run test/conformance.test.ts
      - name: Rust conformance suite
        run: cargo test -p wh40kdc --test conformance

  publish-crate:
    # Auto-publish wh40kdc to crates.io once main is green. Self-gates on the
    # crate version: if this version is already on the registry the publish is
    # skipped, so the job is a no-op on every main push until Cargo.toml's
    # version is bumped. Requires the CARGO_REGISTRY_TOKEN repo secret.
    needs: [validate, rust, conformance]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Read crate version
        id: ver
        run: echo "version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name=="wh40kdc") | .version')" >> "$GITHUB_OUTPUT"
      - name: Skip if version already on crates.io
        id: check
        run: |
          if curl -sfI -H 'User-Agent: 40kdc-data-ci (github actions)' \
              "https://crates.io/api/v1/crates/wh40kdc/${{ steps.ver.outputs.version }}" >/dev/null; then
            echo "wh40kdc ${{ steps.ver.outputs.version }} already published; skipping."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to crates.io
        if: steps.check.outputs.publish == 'true'
        run: cargo publish -p wh40kdc --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-npm:
    # Auto-publish @alpaca-software/40kdc-data to npm once main is green.
    # Self-gates on the package version: if this version is already on the
    # registry the publish is skipped, so the job is a no-op on every main push
    # until tools/package.json's version is bumped. The published payload
    # (dist + embedded data + schemas) is built by the package's `prepack` step.
    #
    # Requires the NPM_REGISTRY_TOKEN repo secret to be an npm *automation*
    # token (these bypass 2FA — interactive OTP is impossible in CI), and the
    # alpaca-software org's publish setting must permit tokens. Provenance is
    # attached via OIDC, which needs `id-token: write` and a public repo.
    needs: [validate, rust, conformance]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: cd tools && npm ci
      - name: Read package version
        id: ver
        run: echo "version=$(node -p "require('./tools/package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Skip if version already on npm
        id: check
        run: |
          if npm view "@alpaca-software/40kdc-data@${{ steps.ver.outputs.version }}" version >/dev/null 2>&1; then
            echo "@alpaca-software/40kdc-data ${{ steps.ver.outputs.version }} already published; skipping."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to npm
        if: steps.check.outputs.publish == 'true'
        run: cd tools && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_REGISTRY_TOKEN }}
